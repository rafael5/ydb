name: MUMPS Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install YottaDB
        run: |
          curl -fsSL https://gitlab.com/YottaDB/DB/YDB/raw/master/sr_unix/ydbinstall.sh -o ydbinstall.sh
          sudo bash ydbinstall.sh --utf8 default
          YDB_DIST=$(ls -d /usr/local/lib/yottadb/r* | sort -V | tail -1)
          echo "YDB_DIST=$YDB_DIST" >> $GITHUB_ENV
          echo "$YDB_DIST" >> $GITHUB_PATH

      - name: Initialize database
        run: |
          mkdir -p $HOME/data/ydb/{g,db}
          export ydb_dist=$YDB_DIST
          export ydb_dir=$HOME/data/ydb
          export ydb_gbldir=$HOME/data/ydb/g/ydb.gld
          export ydb_routines="$GITHUB_WORKSPACE/routines $GITHUB_WORKSPACE/routines/tests $YDB_DIST"
          cd $HOME/data/ydb/g
          $YDB_DIST/mumps -run GDE << 'EOF'
          change -segment DEFAULT -file="$HOME/data/ydb/db/ydb.dat"
          change -region DEFAULT -dynamic=DEFAULT
          exit
          EOF
          $YDB_DIST/mupip create

      - name: Run tests
        env:
          ydb_dir: ${{ env.HOME }}/data/ydb
          ydb_gbldir: ${{ env.HOME }}/data/ydb/g/ydb.gld
        run: |
          export ydb_dist=$YDB_DIST
          export ydb_routines="$GITHUB_WORKSPACE/routines $GITHUB_WORKSPACE/routines/tests $YDB_DIST"
          $YDB_DIST/ydb -run ^TESTRUN HELLOTST
